services:
  php:
    container_name: php
    build:
      context: .
    depends_on:
      - db
    ports:
      - "9000:80"
    volumes:
      - .:/var/www/html

  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer:5.4.2
    container_name: adminer
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  db_data:

