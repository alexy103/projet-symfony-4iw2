name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: ci
      DATABASE_URL: 'sqlite:///%kernel.project_dir%/var/ci.db'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, mbstring, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint YAML
        run: php bin/console lint:yaml config fixtures --parse-tags

      - name: Lint Twig
        run: php bin/console lint:twig templates

      - name: Lint Container
        run: php bin/console lint:container

      - name: Run PHPUnit
        run: php bin/phpunit